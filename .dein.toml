[[plugins]]
repo='Shougo/dein.vim'

[[plugins]]
repo='Shougo/VimProc'
build='make'

[[plugins]]
repo='cocopon/iceberg.vim'
hook_add='''
  au MyAutoCmd VimEnter * nested colorscheme iceberg
'''

