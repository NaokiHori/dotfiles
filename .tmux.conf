# use Ctrl+a as prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix
# basic settings
set -g base-index 1
setw -g renumber-windows on
set -g default-terminal "screen-256color"
set -g terminal-overrides "xterm:colors=256"
set -g allow-rename off
set -sg escape-time 0
bind % split-window -hc "#{pane_current_path}"
bind '"' split-window -vc "#{pane_current_path}"
setw -g mode-keys vi
setw -g status-keys vi
#bind-key p paste-buffer
# resize pane key bind
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# pain colour
set -g window-style "fg=colour243,bg=black"
set -g window-active-style "fg=white,bg=black"
# set border colour of pain
set -g pane-border-style "bg=#000000,fg=#ffffff"
set -g pane-active-border-style "bg=#000000, fg=#0000ff"
# message window settings
set -g message-style "fg=#cccc00, bg=#000000"
# status line
set -g status-justify left
set -g status-fg "#e6ffff"
set -g status-bg "#001a1a"
set -g status-interval 1
set -g status-left-length 100
set -g status-left " #[bg=#68a4b1] Session No. #(exec echo $((#S+1))) (Total: #(exec tmux ls | wc -l | xargs echo)) #[default] #[bg=#4e8a97] #(exec bash ~/.dotfiles/tmux/check_git_branch '#{pane_current_path}') #[default] "
set -g status-right-length 120
set -g status-right " #[bg=#6b57a8] #{b:pane_current_path} #[default] #[bg=#604e97] #(exec bash ~/.dotfiles/tmux/used_mem) #[default] #[bg=#4b3d76] 20%y/%m/%d(%a) %H:%M:%S #[default] "
setw -g window-status-format "#[bg=#000064] #I: #W #[default]"
setw -g window-status-current-format "#[bg=#0000b3,bold]#{?client_prefix,#[reverse],} Window #I: #W #[default]"
