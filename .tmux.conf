# basic settings
set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'
set -sg escape-time 0
set-option -g allow-rename off
# resize pane key bind
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# pain colour
set -g window-style 'fg=colour245,bg=colour234'
set -g window-active-style 'fg=white,bg=black'
# set border colour of pain
set -g pane-border-bg colour234
set -g pane-border-fg colour255
set -g pane-active-border-bg colour0
set -g pane-active-border-fg colour20
# message window settings
set -g message-fg colour16
set -g message-bg colour3
set -g message-attr bright
# status line
set -g status-fg "colour255"
set -g status-bg "colour235"
set -g status-interval 1
set-option -g status-left-length  20
set-option -g status-left  "#[fg=colour255,bg=colour124] Session: #S #[default]"
set-option -g status-right-length 20
set-option -g status-right '#[fg=colour233,bg=colour28,bold] %y-%m-%d #[fg=colour233,bg=colour8,bold] %H:%M:%S '
set-window-option -g window-status-format " #I: #W "
set-window-option -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #W "
