# use Ctrl+a as prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix
# basic settings
set -g base-index 1
setw -g renumber-windows on
set -g default-terminal "screen-256color"
set -g terminal-overrides "xterm:colors=256"
set -g allow-rename off
set -sg escape-time 0
bind % split-window -hc "#{pane_current_path}"
bind '"' split-window -vc "#{pane_current_path}"
setw -g mode-keys vi
setw -g status-keys vi
#bind-key p paste-buffer
# resize pane key bind
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# pain colour
set -g window-style "fg=#c0c0c0"
set -g window-active-style "fg=#ffffff,bg=default"
# set border colour of pain
set -g pane-border-style "fg=#ffffff"
set -g pane-active-border-style "fg=#0000ff"
# message window settings
set -g message-style "fg=#cccc00"
# status line
set -g status-justify left
set -g status-fg "#e6ffff"
set -g status-bg default
set -g status-interval 1
set -g status-left-length 100
set -g status-left " #[bg=#86bd42] Session No. #(exec echo $((#S+1))) (Total: #(exec tmux ls | wc -l | xargs echo)) #[default] #[bg=#78aa3c] #(exec bash ~/.dotfiles/tmux/branch '#{pane_current_path}') #[default] "
set -g status-right-length 120
set -g status-right " #[bg=#94d194] #{b:pane_current_path} #[default] #[bg=#82c982] #(exec bash ~/.dotfiles/tmux/localip) #[default] #[bg=#5eba5e] 20%y/%m/%d(%a) %H:%M:%S #[default] "
setw -g window-status-format "#[bg=#5e842e] #I: #W #[default]"
setw -g window-status-current-format "#[bg=#5e842e,bold,underscore]#{?client_prefix,#[reverse],} Window #I: #W #[default]"
